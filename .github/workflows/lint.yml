name: File Counter Automation

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  count-files:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull down the repository code into the runner
    - name: Check out repository
      uses: actions/checkout@v4

    # Step 2: Establish a stable runtime framework
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Run the calculation target
    - name: Execute counting script
      run: python count_ino.py
